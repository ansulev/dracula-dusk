# Dracula Dusk — warmer, lower-chroma Dracula fork for long sessions
# Palette source: github.com/ansulev/dracula-dusk (palette.map)
#-------------------------------------------------------------------------------
# BG        = #272538   (soft purple-dark)
# BG-ALT    = #302e45   (current line / margins)
# FG        = #c8c5be   (warm dim grey)
# FG-ALT    = #878ea1   (comment / muted)
# SELECTION = #9188bc   (muted lavender highlight, WCAG AA 4.7:1)
# RED       = #e17373
# GREEN     = #73d68c
# YELLOW    = #e1e79f
# PURPLE    = #c1a6e5
# PINK      = #e890c3
# CYAN      = #a1dce7
# ORANGE    = #eab781
#-------------------------------------------------------------------------------

[theme_info]
name=Dracula Dusk
description=Warmer, lower-chroma Dracula fork — WCAG AA, tuned for 10-14h sessions.
compat=1.22;1.23;1.23.1;1.24

[named_styles]
default=#c8c5be;#272538;false;false
error=#e17373;#272538;true;false

# Editor styles
#-------------------------------------------------------------------------------

selection=#272538;#9188bc;true;false
current_line=#c8c5be;#302e45;true;false
brace_good=#272538;#73d68c;true;false
brace_bad=#272538;#e17373;true;false
margin_line_number=#878ea1
margin_folding=#878ea1;#302e45
fold_symbol_highlight=#c8c5be
indent_guide=#302e45
caret=#c1a6e5;#272538;false
marker_line=#302e45;#c1a6e5;
marker_search=#302e45;#c1a6e5;
marker_mark=#302e45;#c1a6e5;
call_tips=#272538;#c8c5be
white_space=#878ea1;#272538;true;false

# Programming languages
#-------------------------------------------------------------------------------

# comments
comment=#878ea1
comment_doc=#c1a6e5
comment_line=comment
comment_line_doc=comment_doc
comment_doc_keyword=comment_doc,bold
comment_doc_keyword_error=comment_doc_keyword,italic

# numbers
number=#e890c3
number_1=number
number_2=number_1

# type
type=#73d68c
class=type
function=default
# like, variable ${}
parameter=#eab781

# keywords
keyword=#c1a6e5
keyword_1=keyword
keyword_2=type
keyword_3=keyword_1
keyword_4=keyword_1

# identifiers
identifier=default
identifier_1=identifier
identifier_2=identifier_1
identifier_3=identifier_1
identifier_4=identifier_1

# strings ""
string=#e17373
string_1=string
string_2=string_1
string_3=default
string_4=default
string_eol=#272538;#c8c5be
# strings ''
character=#73d68c
# command `` or $()
backticks=#73d68c
# heredoc
here_doc=#e890c3

scalar=#eab781
label=default,bold
preprocessor=#e1e79f
regex=#e890c3
operator=#e1e79f
decorator=preprocessor
other=default
extra=#c1a6e5

# Markup-type languages
#-------------------------------------------------------------------------------

tag=type
tag_unknown=tag,italic
tag_end=tag
attribute=keyword
attribute_unknown=attribute,italic
value=string_1
entity=preprocessor

# Diff
#-------------------------------------------------------------------------------

line_added=#73d68c
line_removed=#e17373
line_changed=#e890c3
